<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  
  <title>PixelWave — Pac-Man</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/shared.css"/>
  
  
  <link rel="stylesheet" href="../styles/pacman.css"/>
</head>
<body>
  
  <button id="pauseBtn" type="button">⏸</button>
<div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <button class="mute-btn" id="audioBtn" type="button" title="Réglages audio">🎵</button>
      <button class="mute-btn" id="muteBtn">🔊</button>
    <button class="fs-btn" id="fsBtn">⛶ PLEIN ÉCRAN</button>
      <a href="../index.html" class="back-btn">← RETOUR</a>
  </div>

  <div class="game-wrapper">
    <h1>👾 PAC-MAN</h1>
    <div class="stats">
      <div><span class="stat-label">SCORE</span><span class="stat-val" id="scoreEl">0</span></div>
      <div><span class="stat-label">MEILLEUR</span><span class="stat-val" id="bestEl">0</span></div>
      <div><span class="stat-label">VIES</span><span class="stat-val" id="livesEl">🟡🟡🟡</span></div>
      <div><span class="stat-label">NIVEAU</span><span class="stat-val" id="levelEl">1</span></div>
    </div>

    <div id="pwPlaySurface">
    <canvas id="gameCanvas"></canvas>
    <p class="msg" id="msgEl">APPUIE SUR JOUER !</p>

    <div class="controls">
      <button class="btn btn-start" id="playBtn" type="button">▶ JOUER</button>
    </div>

    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="dUp">▲</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="dLeft">◀</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="dRight">▶</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="dDown">▼</button>
      <div class="dpad-btn empty"></div>
    </div>
    </div>

    <p class="tips">
      FLÈCHES / WASD · MOBILE : D-PAD · ← TUNNEL →
    </p>
  </div>

  <div class="divider"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  <!-- ── GAME SCRIPT ── -->
  

  <script src="../scripts/sound.js"></script>
  <script src="../scripts/shared.js"></script>
  
  <script src="../scripts/pacman.js"></script>
</body>
</html>

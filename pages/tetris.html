<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  
  <title>PixelWave — Tetris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/shared.css"/>
  
  
  <link rel="stylesheet" href="../styles/tetris.css"/>
</head>
<body>
  
  <button id="pauseBtn" type="button">⏸</button>
<div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="mute-btn" id="audioBtn" type="button" title="Réglages audio">🎵</button>
      <button class="mute-btn" id="muteBtn">🔊</button>
      <button class="fs-btn" id="fsBtn">⛶ PLEIN ÉCRAN</button>
      <a href="../index.html" class="back-btn">← RETOUR</a>
    </div>
  </div>

  <div class="game-area">
    <h1>🟦 TETRIS</h1>

    <div class="play-zone" id="tetrisPlayZone">
      <!-- Main board -->
      <canvas id="tetrisCanvas" width="200" height="400"></canvas>

      <!-- Side panel -->
      <div class="side-panel">
        <div class="panel-box">
          <span class="panel-label">SUIVANT</span>
          <canvas id="nextCanvas" width="80" height="80"></canvas>
        </div>
        <div class="panel-box">
          <span class="panel-label">SCORE</span>
          <span class="panel-val" id="scoreEl">0</span>
        </div>
        <div class="panel-box">
          <span class="panel-label">MEILLEUR</span>
          <span class="panel-val" id="bestEl">0</span>
        </div>
        <div class="panel-box">
          <span class="panel-label">NIVEAU</span>
          <span class="panel-val" id="levelEl">1</span>
        </div>
        <div class="panel-box">
          <span class="panel-label">LIGNES</span>
          <span class="panel-val" id="linesEl">0</span>
        </div>
      </div>
    </div>

    <p class="msg" id="msgEl">APPUIE SUR START !</p>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">▶ START</button>
      <button class="btn btn-reset" id="resetBtn">↺ RESET</button>
    </div>

    <!-- Mobile controls -->
    <div class="mobile-ctrl">
      <div class="mobile-row">
        <button class="m-btn" id="mRotate">↻</button>
      </div>
      <div class="mobile-row">
        <button class="m-btn" id="mLeft">◀</button>
        <button class="m-btn wide" id="mDown">▼▼</button>
        <button class="m-btn" id="mRight">▶</button>
      </div>
      <div class="mobile-row">
        <button class="m-btn wide" id="mDrop" style="width:170px;font-size:.6rem;font-family:'Press Start 2P',monospace;letter-spacing:1px">DROP</button>
      </div>
    </div>

    <p class="tips">
      ← → DÉPLACER &nbsp;|&nbsp; ↑ / Z ROTATION &nbsp;|&nbsp; ↓ DESCENTE RAPIDE &nbsp;|&nbsp; ESPACE DROP
    </p>
  </div>

  <div class="divider"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  

  <script src="../scripts/sound.js"></script>
  <script src="../scripts/shared.js"></script>
  
  <script src="../scripts/tetris.js"></script>
</body>
</html>

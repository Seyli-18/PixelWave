<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>PixelWave — Memory Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    html{touch-action:manipulation}
    
    :root{
      --bg:#0a0a1a;--accent:#ff3cac;--good:#00ff88;--bad:#ff3c3c;
      --text:#e8e8ff;--muted:#7070a0;--border:#1e1e4a;
      --font-px:'Press Start 2P',monospace;--font-b:'Rajdhani',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:9999}
    .top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(10,10,26,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
    .logo{font-family:var(--font-px);font-size:.65rem;background:linear-gradient(90deg,#00f0ff,#ff3cac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 6px #00f0ff)}
    .back-btn{font-family:var(--font-px);font-size:.5rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.5rem .9rem;border-radius:6px;transition:all .2s}
    .back-btn:hover{color:#00f0ff;border-color:#00f0ff;box-shadow:0 0 10px #00f0ff55}
    .game-area{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;gap:1.2rem;width:100%}
    h1{font-family:var(--font-px);font-size:.8rem;color:var(--accent);text-shadow:0 0 20px var(--accent);letter-spacing:3px}
    .stats{display:flex;gap:2rem;font-family:var(--font-px);font-size:.52rem;letter-spacing:2px;text-align:center}
    .stat-label{color:var(--muted);display:block;margin-bottom:.35rem}
    .stat-val{font-size:.8rem;color:var(--accent)}

    /* difficulty select */
    .diff-row{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
    .diff-btn{font-family:var(--font-px);font-size:.42rem;letter-spacing:1px;padding:.45rem .9rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
    .diff-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px #ff3cac44}

    /* Card grid */
    .card-grid{display:grid;gap:10px;width:100%;max-width:480px}
    .card-grid.g4 {grid-template-columns:repeat(4,1fr)}
    .card-grid.g5 {grid-template-columns:repeat(5,1fr)}
    .card-grid.g6 {grid-template-columns:repeat(6,1fr)}

    .mem-card{aspect-ratio:1;border-radius:10px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
    .mem-card.flipped{transform:rotateY(180deg)}
    .mem-card.matched{transform:rotateY(180deg);cursor:default}

    .card-face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
    .card-back{background:#12122a;border:2px solid var(--border);font-size:1.5rem}
    .card-front{background:#1a0a2a;border:2px solid var(--accent);transform:rotateY(180deg);font-size:1.8rem}
    .mem-card.matched .card-front{border-color:var(--good);background:#00220a;box-shadow:0 0 16px #00ff8866}

    .msg{font-family:var(--font-px);font-size:.55rem;color:var(--muted);letter-spacing:2px;min-height:1.8em;text-align:center;line-height:1.8}
    .controls{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
    .btn{font-family:var(--font-px);font-size:.48rem;letter-spacing:2px;padding:.65rem 1.3rem;border:2px solid;border-radius:8px;cursor:pointer;background:transparent;transition:all .2s}
    .btn-start{color:var(--accent);border-color:var(--accent)}
    .btn-start:hover{background:var(--accent);color:#000;box-shadow:0 0 20px var(--accent)}
    .btn-reset{color:var(--bad);border-color:var(--bad)}
    .btn-reset:hover{background:var(--bad);color:#fff;box-shadow:0 0 20px var(--bad)}
    .divider{width:100%;max-width:520px;height:1px;background:linear-gradient(90deg,transparent,#1e1e4a,transparent);margin:.5rem 0}
  
    /* ── Thème clair ── */
    [data-theme="light"] body{background:#eeeeff!important;color:#1a1a3a!important}
    [data-theme="light"] .top-bar{background:rgba(240,240,255,.95)!important;border-bottom-color:#c0c0e0!important}
    [data-theme="light"] .back-btn,.fs-btn{color:#5050a0!important;border-color:#c0c0e0!important}
    [data-theme="light"] .section-card,.form-card{background:#fff!important;border-color:#d0d0e0!important}
    [data-theme="light"] h1{filter:drop-shadow(0 0 10px currentColor)}
</style>
  <script>
    // Appliquer le thème sauvegardé immédiatement
    (function(){var t=localStorage.getItem('pw_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="fs-btn" id="fsBtn">⛶ PLEIN ÉCRAN</button>
      <a href="index.html" class="back-btn">← RETOUR</a>
    </div>
  </div>

  <div class="game-area">
    <h1>🃏 MEMORY CARDS</h1>
    <div class="stats">
      <div><span class="stat-label">ESSAIS</span><span class="stat-val" id="movesEl">0</span></div>
      <div><span class="stat-label">PAIRES</span><span class="stat-val" id="pairsEl">0/0</span></div>
      <div><span class="stat-label">TEMPS</span><span class="stat-val" id="timerEl">0s</span></div>
      <div><span class="stat-label">MEILLEUR</span><span class="stat-val" id="bestEl">—</span></div>
    </div>

    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy">4×4 FACILE</button>
      <button class="diff-btn" data-diff="medium">5×4 MOYEN</button>
      <button class="diff-btn" data-diff="hard">6×5 DUR</button>
    </div>

    <div class="card-grid g4" id="cardGrid"></div>
    <p class="msg" id="msgEl">APPUIE SUR START !</p>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">▶ START</button>
      <button class="btn btn-reset" id="resetBtn">↺ RESET</button>
    </div>
  </div>

  <div class="divider"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  <script>
  (function(){
    const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🦁',
                    '🐮','🐷','🐸','🐵','🐔','🐧','🐦','🦆','🦉','🦋',
                    '🐢','🦎','🐍','🐬','🐳','🦈','🐙','🦑','🦀','🐡'];

    const DIFFS = {
      easy:   { cols:4, rows:4, gridClass:'g4' },
      medium: { cols:5, rows:4, gridClass:'g5' },
      hard:   { cols:6, rows:5, gridClass:'g6' },
    };

    let diff='easy', cards=[], flipped=[], matched=0, moves=0;
    let running=false, startTime=0, timerInt=null, locked=false;
    let totalPairs=0;

    const grid  = document.getElementById('cardGrid');
    const msgEl = document.getElementById('msgEl');

    function buildDeck(d) {
      const n = (d.cols * d.rows) / 2;
      const pool = EMOJIS.slice(0, n);
      const deck = [...pool, ...pool];
      for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
      return deck;
    }

    function render(d) {
      totalPairs = (d.cols * d.rows) / 2;
      const deck = buildDeck(d);
      grid.className = 'card-grid ' + d.gridClass;
      grid.innerHTML = '';
      cards = deck.map((emoji, i) => {
        const el = document.createElement('div');
        el.className = 'mem-card';
        el.dataset.emoji = emoji;
        el.dataset.idx   = i;
        el.innerHTML = `
          <div class="card-face card-back">🎴</div>
          <div class="card-face card-front">${emoji}</div>
        `;
        el.addEventListener('click', () => flip(el));
        grid.appendChild(el);
        return el;
      });
      matched=0; moves=0; flipped=[];
      document.getElementById('pairsEl').textContent = '0/' + totalPairs;
      document.getElementById('movesEl').textContent = '0';
    }

    function flip(el) {
      if (!running || locked) return;
      if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      flipped.push(el);
      if (flipped.length === 2) check();
    }

    function check() {
      locked = true;
      moves++;
      document.getElementById('movesEl').textContent = moves;
      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched'); b.classList.add('matched');
        matched++;
        document.getElementById('pairsEl').textContent = matched + '/' + totalPairs;
        flipped = []; locked = false;
        if (matched === totalPairs) win();
      } else {
        setTimeout(() => {
          a.classList.remove('flipped'); b.classList.remove('flipped');
          flipped = []; locked = false;
        }, 900);
      }
    }

    function win() {
      running = false;
      clearInterval(timerInt);
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      // Score: base 10000 - (moves * 50) - (elapsed * 10), min 100
      const score = Math.max(100, 10000 - moves * 50 - elapsed * 10);
      msgEl.textContent = `GAGNÉ ! ${moves} essais · ${elapsed}s · SCORE ${score}`;
      msgEl.style.color = '#00ff88';

      // Save best (lowest moves)
      const bestKey = 'memBest_' + diff;
      const prev = parseInt(localStorage.getItem(bestKey) || '9999');
      if (moves < prev) { localStorage.setItem(bestKey, moves); }
      updateBest();

      if (window.PixelWave && window.PixelWave.submitScore) window.PixelWave.submitScore(score);
    }

    function updateBest() {
      const b = localStorage.getItem('memBest_' + diff);
      document.getElementById('bestEl').textContent = b ? b + ' essais' : '—';
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      if (running) return;
      running = true; locked = false; moves = 0; matched = 0; flipped = [];
      msgEl.textContent = ''; msgEl.style.color = '';
      render(DIFFS[diff]);
      startTime = Date.now();
      clearInterval(timerInt);
      timerInt = setInterval(() => {
        document.getElementById('timerEl').textContent = Math.round((Date.now()-startTime)/1000) + 's';
      }, 1000);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      running = false; clearInterval(timerInt);
      render(DIFFS[diff]);
      msgEl.textContent = 'APPUIE SUR START !'; msgEl.style.color = '';
      document.getElementById('timerEl').textContent = '0s';
    });

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diff = btn.dataset.diff;
        running = false; clearInterval(timerInt);
        render(DIFFS[diff]);
        updateBest();
        msgEl.textContent = 'APPUIE SUR START !'; msgEl.style.color = '';
        document.getElementById('timerEl').textContent = '0s';
      });
    });

    render(DIFFS[diff]);
    updateBest();
  })();
  </script>

  <script src="shared.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => { window.PixelWave.initFullscreen('cardGrid', 'fsBtn');
      window.PixelWave.init('memory', '#ff3cac'); });
  </script>
  <script>
    // ── Pseudo modal avant le 1er start ──
    (function(){
      var _origStartBtn = document.getElementById('startBtn');
      if (!_origStartBtn) return;
      var _firstStart = true;
      var _origClick = null;
      // Clone pour remplacer (évite les listeners multiples)
      var _newBtn = _origStartBtn.cloneNode(true);
      _origStartBtn.parentNode.replaceChild(_newBtn, _origStartBtn);
      _newBtn.addEventListener('click', function(e){
        if (_firstStart && !localStorage.getItem('pw_pseudo')) {
          _firstStart = false;
          e.stopImmediatePropagation();
          window.PixelWave.promptPseudo('memory', function(){
            // Simuler le vrai clic après confirmation
            _newBtn.click();
          });
        } else {
          _firstStart = false;
        }
      }, true); // capture phase = before game listener
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  
  <title>PixelWave — Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css"/>
  <style>
    html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    
    /* =====================
       SNAKE — styles.css
       ===================== */
    :root {
      --bg:      #0a0a1a;
      --board:   #0d1f0d;
      --accent:  #00ff88;
      --accent2: #ff3cac;
      --accent3: #ffe44e;
      --text:    #e8e8ff;
      --muted:   #7070a0;
      --font-px: 'Press Start 2P', monospace;
      --font-b:  'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Nav ── */
    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #1e1e4a;
      background: rgba(10,10,26,.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-px);
      font-size: .65rem;
      background: linear-gradient(90deg, #00f0ff, #ff3cac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 6px #00f0ff);
    }

    .back-btn {
      font-family: var(--font-px);
      font-size: .5rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid #1e1e4a;
      padding: .5rem .9rem;
      border-radius: 6px;
      transition: all .2s;
      letter-spacing: 1px;
    }
    .back-btn:hover { color: #00f0ff; border-color: #00f0ff; box-shadow: 0 0 10px #00f0ff55; }

    /* ── Game layout ── */
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 1.5rem;
      width: 100%;
      max-width: 600px;
    }

    .game-title {
      font-family: var(--font-px);
      font-size: 1rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      letter-spacing: 3px;
      text-align: center;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      gap: 2rem;
      font-family: var(--font-px);
      font-size: .55rem;
      letter-spacing: 2px;
    }
    .score-item { text-align: center; }
    .score-label { color: var(--muted); display: block; margin-bottom: .4rem; }
    .score-val   { color: var(--accent3); font-size: .85rem; }

    /* ── Canvas ── */
    #gameCanvas {
      border: 2px solid var(--accent);
      border-radius: 8px;
      box-shadow: 0 0 30px #00ff8844, 0 0 60px #00ff8822;
      background: var(--board);
      display: block;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: var(--font-px);
      font-size: .5rem;
      letter-spacing: 2px;
      padding: .7rem 1.5rem;
      border: 2px solid;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      transition: all .2s;
    }

    .btn-start {
      color: var(--accent);
      border-color: var(--accent);
    }
    .btn-start:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent);
    }

    .btn-reset {
      color: var(--accent2);
      border-color: var(--accent2);
    }
    .btn-reset:hover {
      background: var(--accent2);
      color: #fff;
      box-shadow: 0 0 20px var(--accent2);
    }

    /* ── D-pad (mobile) ── */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
    }

    .dpad-btn {
      background: #12122a;
      border: 1px solid #1e1e4a;
      border-radius: 8px;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: #00ff8833; }
    .dpad-btn.empty  { background: transparent; border: none; pointer-events: none; }

    /* ── Overlay message ── */
    .overlay-msg {
      font-family: var(--font-px);
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.8;
      min-height: 2em;
    }

    /* ── Tips ── */
    .tips {
      font-family: var(--font-px);
      font-size: .42rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: center;
      line-height: 2.2;
    }
  
    /* ── Thème clair overrides ── */
    [data-theme="light"] body { background: #eeeeff !important; color: #1a1a3a !important; }
    [data-theme="light"] .top-bar { background: rgba(238,238,255,.96) !important; border-bottom-color: #c8c8e8 !important; }
    [data-theme="light"] .back-btn { color: #5050a0 !important; border-color: #c8c8e8 !important; }
    [data-theme="light"] .fs-btn { color: #5050a0 !important; border-color: #c8c8e8 !important; background: rgba(238,238,255,.8) !important; }
    [data-theme="light"] h1 { filter: drop-shadow(0 0 8px currentColor) !important; }
  </style>
  <script>
    (function(){var t=localStorage.getItem('pw_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

  <!-- Nav -->
  <div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <a href="index.html" class="back-btn">← RETOUR</a>
  </div>

  <div class="game-wrapper">
    <h1 class="game-title">🐍 SNAKE GAME</h1>

    <!-- Score -->
    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">SCORE</span>
        <span class="score-val" id="score">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">MEILLEUR</span>
        <span class="score-val" id="bestScore">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">NIVEAU</span>
        <span class="score-val" id="level">1</span>
      </div>
    </div>

    <!-- Canvas -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Message -->
    <p class="overlay-msg" id="msg">APPUIE SUR START !</p>

    <!-- Buttons -->
    <div class="controls">
      <button class="btn btn-start" id="startBtn">▶ START</button>
      <button class="btn btn-reset" id="resetBtn">↺ RESET</button>
    </div>

    <!-- D-pad for mobile -->
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="up">▲</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="left">◀</button>
      <div class="dpad-btn empty">·</div>
      <button class="dpad-btn" id="right">▶</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" id="down">▼</button>
      <div class="dpad-btn empty"></div>
    </div>

    <p class="tips">
      CLAVIER : FLÈCHES ou WASD &nbsp;|&nbsp; MOBILE : D-PAD CI-DESSUS<br>
      CHAQUE 5 POMMES = NIVEAU +1 &amp; VITESSE +
    </p>
  </div>

  <div style="width:100%;max-width:520px;height:1px;background:linear-gradient(90deg,transparent,#1e1e4a,transparent);margin:.5rem 0"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  <script>
    /* =====================
       SNAKE — game.js
       ===================== */

    const CELL  = 20;
    const COLS  = 20;
    const ROWS  = 20;

    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('bestScore');
    const levelEl = document.getElementById('level');
    const msgEl   = document.getElementById('msg');

    let snake, dir, nextDir, food, score, level, best, running, loop;

    function init() {
      snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      level   = 1;
      best    = parseInt(localStorage.getItem('snakeBest') || '0');
      running = false;
      placeFood();
      updateUI();
      drawFrame();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function speed() { return Math.max(80, 220 - (level - 1) * 20); }

    /* ── Draw ── */
    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines (faint)
      ctx.strokeStyle = 'rgba(0,255,136,.06)';
      ctx.lineWidth = .5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#ff3cac';
      ctx.shadowColor = '#ff3cac';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#00ff88'
          : `rgba(0,${Math.round(200 - ratio * 100)},${Math.round(130 - ratio * 60)},${1 - ratio * .5})`;
        ctx.shadowColor = i === 0 ? '#00ff88' : 'transparent';
        ctx.shadowBlur  = i === 0 ? 12 : 0;
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
      });
      ctx.shadowBlur = 0;
    }

    /* ── Tick ── */
    function tick() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
        if (snake.length % 5 === 0) level++;
        placeFood();
        clearInterval(loop);
        loop = setInterval(tick, speed());
      } else {
        snake.pop();
      }

      updateUI();
      drawFrame();
    }

    function updateUI() {
      scoreEl.textContent = score;
      bestEl.textContent  = best;
      levelEl.textContent = level;
    }

    function gameOver() {
      running = false;
      clearInterval(loop);
      msgEl.textContent = `GAME OVER — SCORE ${score} — APPUIE SUR RESET`;
      msgEl.style.color = '#ff3cac';
      if (window.PixelWave && window.PixelWave.submitScore) window.PixelWave.submitScore(score);
      if (window.PixelWave && window.PixelWave.submitScoreAnon) window.PixelWave.submitScoreAnon(score);
    }

    /* ── Controls ── */
    document.getElementById('startBtn').addEventListener('click', () => {
      if (running) return;
      running = true;
      msgEl.textContent = '';
      msgEl.style.color = '';
      loop = setInterval(tick, speed());
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      clearInterval(loop);
      init();
      msgEl.textContent = 'APPUIE SUR START !';
      msgEl.style.color = '';
    });

    const keyMap = {
      ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
      ArrowDown:  { x: 0, y: 1  }, s: { x: 0, y: 1  },
      ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0  }, d: { x: 1,  y: 0 },
    };

    document.addEventListener('keydown', e => {
      const d = keyMap[e.key];
      if (!d) return;
      e.preventDefault();
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    });

    // D-pad
    document.getElementById('up').addEventListener('click',    () => { if (dir.y !== 1)  nextDir = { x:0,  y:-1 }; });
    document.getElementById('down').addEventListener('click',  () => { if (dir.y !== -1) nextDir = { x:0,  y:1  }; });
    document.getElementById('left').addEventListener('click',  () => { if (dir.x !== 1)  nextDir = { x:-1, y:0  }; });
    document.getElementById('right').addEventListener('click', () => { if (dir.x !== -1) nextDir = { x:1,  y:0  }; });

    // Touch swipe
    let tx = 0, ty = 0;
    canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy)) {
        nextDir = dx > 0 ? { x:1, y:0 } : { x:-1, y:0 };
      } else {
        nextDir = dy > 0 ? { x:0, y:1 } : { x:0, y:-1 };
      }
    }, { passive: true });

    init();
  </script>

  <script src="shared.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      window.PixelWave.initFullscreen('gameCanvas', 'fsBtn');
      window.PixelWave.init('snake', '#00ff88');

      // Popup pseudo à chaque clic sur Jouer (si pas encore de pseudo)
      var _btn = document.getElementById('startBtn');
      if (_btn) {
        _btn.addEventListener('click', function(e) {
          if (!localStorage.getItem('pw_pseudo')) {
            e.stopImmediatePropagation();
            e.preventDefault();
            window.PixelWave.promptPseudo('snake', function() {
              // Relancer le clic après validation
              setTimeout(function() { _btn.click(); }, 50);
            });
          }
        }, true); // capture phase
      }
    });
  </script>
</body>
</html>

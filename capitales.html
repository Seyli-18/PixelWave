<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  
  <title>PixelWave — Quiz Capitales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    html{touch-action:manipulation}
    
    :root{
      --bg:#0a0a1a;--card:#12122a;--border:#1e1e4a;
      --accent:#00f0ff;--good:#00ff88;--bad:#ff3c3c;--accent3:#ffe44e;
      --text:#e8e8ff;--muted:#7070a0;
      --font-px:'Press Start 2P',monospace;--font-b:'Rajdhani',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:9999}
    .top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(10,10,26,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
    .logo{font-family:var(--font-px);font-size:.65rem;background:linear-gradient(90deg,#00f0ff,#ff3cac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 6px #00f0ff)}
    .back-btn{font-family:var(--font-px);font-size:.5rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.5rem .9rem;border-radius:6px;transition:all .2s}
    .back-btn:hover{color:#00f0ff;border-color:#00f0ff;box-shadow:0 0 10px #00f0ff55}

    .quiz-wrapper{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem;gap:1.5rem;width:100%;max-width:640px}
    h1{font-family:var(--font-px);font-size:.78rem;color:var(--accent);text-shadow:0 0 20px var(--accent);letter-spacing:3px;text-align:center}

    .stats{display:flex;gap:2rem;font-family:var(--font-px);font-size:.52rem;letter-spacing:2px;text-align:center}
    .stat-label{color:var(--muted);display:block;margin-bottom:.35rem}
    .stat-val{font-size:.8rem;color:var(--accent3)}

    .progress-wrap{width:100%;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#b44fff);border-radius:999px;transition:width .4s ease}

    /* Question card */
    .question-card{
      width:100%;background:#0d0d24;border:2px solid var(--accent);border-radius:14px;
      padding:1.5rem;text-align:center;
      box-shadow:0 0 30px #00f0ff22;
      transition:border-color .3s;
    }
    .question-card.correct{border-color:var(--good);box-shadow:0 0 30px #00ff8844}
    .question-card.wrong  {border-color:var(--bad);box-shadow:0 0 30px #ff3c3c44}

    .region-badge{
      display:inline-block;
      font-family:var(--font-px);font-size:.42rem;letter-spacing:1px;
      padding:.3rem .8rem;border-radius:999px;margin-bottom:1rem;
      background:#1e1e4a;color:var(--muted);
    }

    .question-text{
      font-family:var(--font-b);font-size:1.3rem;font-weight:700;color:var(--text);
      line-height:1.4;margin-bottom:.3rem;
    }
    .question-sub{font-family:var(--font-px);font-size:.48rem;color:var(--muted);letter-spacing:1px}

    /* Timer bar */
    .timer-wrap{width:100%;height:4px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:1rem}
    .timer-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .1s linear}

    /* Answer grid */
    .answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%}
    .ans-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-b);font-size:1.05rem;font-weight:600;padding:.9rem 1rem;cursor:pointer;transition:all .2s;text-align:center;letter-spacing:.5px}
    .ans-btn:hover:not(:disabled){border-color:var(--accent);background:#1a1a40;color:var(--accent)}
    .ans-btn.correct{background:#00441a;border-color:var(--good);color:var(--good)}
    .ans-btn.wrong  {background:#440000;border-color:var(--bad);color:var(--bad)}
    .ans-btn:disabled{cursor:default;opacity:.75}

    .feedback{font-family:var(--font-px);font-size:.58rem;letter-spacing:2px;min-height:1.5em;text-align:center}
    .feedback.correct{color:var(--good)}
    .feedback.wrong  {color:var(--bad)}

    .next-btn{font-family:var(--font-px);font-size:.52rem;letter-spacing:2px;padding:.75rem 2rem;border:2px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);cursor:pointer;transition:all .2s;display:none}
    .next-btn:hover{background:var(--accent);color:#000;box-shadow:0 0 20px var(--accent)}
    .next-btn.visible{display:block}

    /* Result */
    .result-screen{display:none;flex-direction:column;align-items:center;gap:1.5rem;text-align:center}
    .result-screen.show{display:flex}
    .result-title{font-family:var(--font-px);font-size:.9rem;color:var(--accent3);text-shadow:0 0 20px var(--accent3)}
    .result-score{font-family:var(--font-px);font-size:2.5rem;color:var(--good)}
    .restart-btn{font-family:var(--font-px);font-size:.52rem;letter-spacing:2px;padding:.75rem 2rem;border:2px solid var(--good);border-radius:8px;background:transparent;color:var(--good);cursor:pointer;transition:all .2s}
    .restart-btn:hover{background:var(--good);color:#000;box-shadow:0 0 20px var(--good)}

    .divider{width:100%;max-width:640px;height:1px;background:linear-gradient(90deg,transparent,#1e1e4a,transparent);margin:.5rem 0}
    @media(max-width:400px){.answer-grid{grid-template-columns:1fr}}
  
    /* ── Thème clair ── */
    [data-theme="light"] body{background:#eeeeff!important;color:#1a1a3a!important}
    [data-theme="light"] .top-bar{background:rgba(240,240,255,.95)!important;border-bottom-color:#c0c0e0!important}
    [data-theme="light"] .back-btn,.fs-btn{color:#5050a0!important;border-color:#c0c0e0!important}
    [data-theme="light"] .section-card,.form-card{background:#fff!important;border-color:#d0d0e0!important}
    [data-theme="light"] h1{filter:drop-shadow(0 0 10px currentColor)}
</style>
  <script>
    // Appliquer le thème sauvegardé immédiatement
    (function(){var t=localStorage.getItem('pw_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="fs-btn" id="fsBtn">⛶ PLEIN ÉCRAN</button>
      <a href="index.html" class="back-btn">← RETOUR</a>
    </div>
  </div>

  <div class="quiz-wrapper">
    <h1>🌍 QUIZ CAPITALES</h1>

    <div class="stats">
      <div><span class="stat-label">QUESTION</span><span class="stat-val" id="qNum">1/20</span></div>
      <div><span class="stat-label">SCORE</span><span class="stat-val" id="scoreEl">0</span></div>
      <div><span class="stat-label">STREAK</span><span class="stat-val" id="streakEl">0🔥</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div id="quizArea" style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;width:100%">
      <div class="question-card" id="questionCard">
        <div class="region-badge" id="regionBadge">🌍 EUROPE</div>
        <div class="question-text" id="questionText">Quelle est la capitale de la France ?</div>
        <div class="question-sub" id="questionSub">CHOISIR LA BONNE RÉPONSE</div>
        <div class="timer-wrap"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      </div>

      <div class="answer-grid" id="answerGrid"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">SUIVANT →</button>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-title">QUIZ TERMINÉ !</div>
      <div class="result-score" id="finalScore">—</div>
      <div style="font-size:1.1rem;color:#7070a0">/ 20 bonnes réponses</div>
      <div id="medal" style="font-size:4rem;margin:.5rem 0">🏅</div>
      <button class="restart-btn" id="restartBtn">↺ REJOUER</button>
    </div>
  </div>

  <div class="divider"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  <script>
  (function(){
    const COUNTRIES = [
      // Europe
      {country:'France',      capital:'Paris',       region:'🇪🇺 Europe'},
      {country:'Allemagne',   capital:'Berlin',      region:'🇪🇺 Europe'},
      {country:'Italie',      capital:'Rome',        region:'🇪🇺 Europe'},
      {country:'Espagne',     capital:'Madrid',      region:'🇪🇺 Europe'},
      {country:'Portugal',    capital:'Lisbonne',    region:'🇪🇺 Europe'},
      {country:'Pays-Bas',    capital:'Amsterdam',   region:'🇪🇺 Europe'},
      {country:'Suède',       capital:'Stockholm',   region:'🇪🇺 Europe'},
      {country:'Norvège',     capital:'Oslo',        region:'🇪🇺 Europe'},
      {country:'Danemark',    capital:'Copenhague',  region:'🇪🇺 Europe'},
      {country:'Finlande',    capital:'Helsinki',    region:'🇪🇺 Europe'},
      {country:'Pologne',     capital:'Varsovie',    region:'🇪🇺 Europe'},
      {country:'Autriche',    capital:'Vienne',      region:'🇪🇺 Europe'},
      {country:'Suisse',      capital:'Berne',       region:'🇪🇺 Europe'},
      {country:'Grèce',       capital:'Athènes',     region:'🇪🇺 Europe'},
      {country:'Roumanie',    capital:'Bucarest',    region:'🇪🇺 Europe'},
      {country:'Hongrie',     capital:'Budapest',    region:'🇪🇺 Europe'},
      // Africa
      {country:'Maroc',       capital:'Rabat',       region:'🌍 Afrique'},
      {country:'Égypte',      capital:'Le Caire',    region:'🌍 Afrique'},
      {country:'Nigeria',     capital:'Abuja',       region:'🌍 Afrique'},
      {country:'Kenya',       capital:'Nairobi',     region:'🌍 Afrique'},
      {country:'Afrique du Sud',capital:'Pretoria',  region:'🌍 Afrique'},
      {country:'Ghana',       capital:'Accra',       region:'🌍 Afrique'},
      {country:'Éthiopie',    capital:'Addis-Abeba', region:'🌍 Afrique'},
      {country:'Tanzanie',    capital:'Dodoma',      region:'🌍 Afrique'},
      {country:'Sénégal',     capital:'Dakar',       region:'🌍 Afrique'},
      {country:'Algérie',     capital:'Alger',       region:'🌍 Afrique'},
      // Asia
      {country:'Japon',       capital:'Tokyo',       region:'🌏 Asie'},
      {country:'Chine',       capital:'Pékin',       region:'🌏 Asie'},
      {country:'Inde',        capital:'New Delhi',   region:'🌏 Asie'},
      {country:'Corée du Sud',capital:'Séoul',       region:'🌏 Asie'},
      {country:'Thaïlande',   capital:'Bangkok',     region:'🌏 Asie'},
      {country:'Vietnam',     capital:'Hanoï',       region:'🌏 Asie'},
      {country:'Indonésie',   capital:'Jakarta',     region:'🌏 Asie'},
      {country:'Pakistan',    capital:'Islamabad',   region:'🌏 Asie'},
      {country:'Turquie',     capital:'Ankara',      region:'🌏 Asie'},
      {country:'Arabie Saoudite',capital:'Riyad',    region:'🌏 Asie'},
      // Americas
      {country:'Brésil',      capital:'Brasilia',    region:'🌎 Amériques'},
      {country:'Argentine',   capital:'Buenos Aires',region:'🌎 Amériques'},
      {country:'Mexique',     capital:'Mexico',      region:'🌎 Amériques'},
      {country:'Canada',      capital:'Ottawa',      region:'🌎 Amériques'},
      {country:'Colombie',    capital:'Bogotá',      region:'🌎 Amériques'},
      {country:'Pérou',       capital:'Lima',        region:'🌎 Amériques'},
      {country:'Chili',       capital:'Santiago',    region:'🌎 Amériques'},
      {country:'Venezuela',   capital:'Caracas',     region:'🌎 Amériques'},
      {country:'Cuba',        capital:'La Havane',   region:'🌎 Amériques'},
      // Oceania
      {country:'Australie',   capital:'Canberra',    region:'🌏 Océanie'},
      {country:'Nouvelle-Zélande',capital:'Wellington',region:'🌏 Océanie'},
      {country:'Papouasie',   capital:'Port Moresby',region:'🌏 Océanie'},
    ];

    const TOTAL_Q  = 20;
    const TIME_PER_Q = 20; // seconds

    let questions=[], current=0, score=0, streak=0, answered=false;
    let timerInt=null, timeLeft=TIME_PER_Q;

    function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function generate() {
      const pool = shuffle(COUNTRIES).slice(0, TOTAL_Q);
      questions = pool.map(correct => {
        const distractors = shuffle(COUNTRIES.filter(c => c.capital !== correct.capital)).slice(0, 3);
        const options = shuffle([correct, ...distractors]);
        return { correct, options };
      });
    }

    function renderQ() {
      const q = questions[current];
      answered = false;
      clearInterval(timerInt); timeLeft = TIME_PER_Q;
      _startTimer(q);

      document.getElementById('regionBadge').textContent   = q.correct.region;
      document.getElementById('questionText').textContent  = q.correct.country;
      document.getElementById('questionSub').textContent   = 'Quelle est sa capitale ?';
      document.getElementById('questionCard').className    = 'question-card';
      document.getElementById('feedback').textContent      = '';
      document.getElementById('feedback').className        = 'feedback';
      document.getElementById('nextBtn').classList.remove('visible');
      document.getElementById('qNum').textContent          = (current+1) + '/' + TOTAL_Q;
      document.getElementById('progressFill').style.width  = (current/TOTAL_Q*100) + '%';

      const grid = document.getElementById('answerGrid');
      grid.innerHTML = '';
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = opt.capital;
        btn.addEventListener('click', () => handleAnswer(btn, opt.capital, q.correct.capital));
        grid.appendChild(btn);
      });
    }

    function _startTimer(q) {
      document.getElementById('timerFill').style.transition = 'none';
      document.getElementById('timerFill').style.width = '100%';
      setTimeout(() => {
        document.getElementById('timerFill').style.transition = `width ${TIME_PER_Q}s linear`;
        document.getElementById('timerFill').style.width = '0%';
      }, 50);

      timerInt = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timerInt);
          if (!answered) handleAnswer(null, null, q.correct.capital);
        }
      }, 1000);
    }

    function handleAnswer(btn, chosen, correct) {
      if (answered) return;
      answered = true;
      clearInterval(timerInt);

      document.querySelectorAll('.ans-btn').forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add('correct');
      });

      const fb   = document.getElementById('feedback');
      const card = document.getElementById('questionCard');

      if (chosen === correct) {
        score++;
        streak++;
        if(btn) btn.classList.add('correct');
        fb.textContent = '✓ CORRECT !' + (streak > 1 ? ' STREAK ' + streak + '🔥' : '');
        fb.className = 'feedback correct';
        card.classList.add('correct');
      } else {
        streak = 0;
        if (btn) btn.classList.add('wrong');
        fb.textContent = chosen ? '✗ RATÉ — C\'était ' + correct : '⏱ TEMPS ÉCOULÉ — ' + correct;
        fb.className = 'feedback wrong';
        card.classList.add('wrong');
      }

      document.getElementById('scoreEl').textContent  = score;
      document.getElementById('streakEl').textContent = streak + '🔥';
      document.getElementById('nextBtn').classList.add('visible');
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      current++;
      if (current >= TOTAL_Q) return showResult();
      renderQ();
    });

    function showResult() {
      clearInterval(timerInt);
      document.getElementById('quizArea').style.display = 'none';
      document.getElementById('resultScreen').classList.add('show');
      document.getElementById('finalScore').textContent = score;
      const pct = score / TOTAL_Q;
      document.getElementById('medal').textContent = pct>=.9?'🥇':pct>=.7?'🥈':pct>=.5?'🥉':'😅';
      document.getElementById('progressFill').style.width = '100%';
      if (window.PixelWave && window.PixelWave.submitScore)     window.PixelWave.submitScore(score);
    }

    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('quizArea').style.display = 'flex';
      document.getElementById('resultScreen').classList.remove('show');
      current=0; score=0; streak=0;
      document.getElementById('scoreEl').textContent  = 0;
      document.getElementById('streakEl').textContent = '0🔥';
      generate(); renderQ();
    });

    generate();
    renderQ();
  })();
  </script>

  <script src="shared.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      window.PixelWave.initFullscreen('quizArea', 'fsBtn');
      window.PixelWave.init('capitales', '#00f0ff');

      // Popup pseudo au chargement si pas encore renseigné
      if (!localStorage.getItem('pw_pseudo')) {
        var _iv = setInterval(function() {
          if (window.PixelWave && window.PixelWave.promptPseudo) {
            clearInterval(_iv);
            window.PixelWave.promptPseudo('capitales', function() {});
          }
        }, 100);
      }
    });
  </script>
</body>
</html>

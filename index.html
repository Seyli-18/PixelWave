<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelWave — Joue maintenant</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDccH-NoPxlJJAmBYq_xoYE0f7_IFZvTlE",
      authDomain: "pixelwave-1dd12.firebaseapp.com",
      projectId: "pixelwave-1dd12",
      storageBucket: "pixelwave-1dd12.firebasestorage.app",
      messagingSenderId: "643733344941",
      appId: "1:643733344941:web:5d55206f213c55c52bec24",
      measurementId: "G-WHG2T4QYZR"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    // 🔐 Google Auth
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("googleSignIn");
      const userInfo = document.getElementById("userInfo");

    btn.addEventListener("click", () => {
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;

          userInfo.innerHTML = `
            <img src="${user.photoURL}" width="40" style="border-radius:50%"><br>
            👾 ${user.displayName}
          `;
        })
        .catch((error) => {
          console.error(error);
          alert(error.message);
        });
    });
  });
</script>
<meta name="google-site-verification" content="h9Vq-qmq-8eekdE0RTIX8DzxmztgvLF30dBKJP1GlCE" />
</head>
<body>
  <!-- ── Header ── -->
  <header>
    <div class="logo">PIXEL<span style="color:#ff3cac;-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">Top Jeux</a>
      <a href="#">Nouveautés</a>
    </nav>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Chercher un jeu…" />
    </div>
    <div class="auth">
      <button id="googleSignIn" class="retro-btn">🎮 Connexion</button>
      <p id="userInfo"></p>
    </div>
  </header>

  <!-- ── Hero ── -->
  <section class="hero">
    <h1>JOUE GRATUITEMENT<br>DIRECTEMENT DANS TON NAVIGATEUR</h1>
    <p>Des centaines de jeux rétro &amp; modernes — sans téléchargement.</p>
  </section>

  <!-- ── Category chips ── -->
  <div class="categories">
    <button class="chip active" data-filter="all">🕹️ Tous</button>
    <button class="chip" data-filter="arcade">🚀 Arcade</button>
    <button class="chip" data-filter="quiz">🧠 Quiz</button>
    <button class="chip" data-filter="puzzle">🧩 Puzzle</button>
  </div>

  <!-- ── Game section ── -->
  <p class="section-title">JEUX POPULAIRES</p>
  <div class="game-grid" id="gameGrid">
    <!-- Cartes injectées par main.js -->
  </div>

  <!-- ── Footer ── -->
  <footer>
    <p><span>PIXELWAVE</span> &nbsp;•&nbsp; Fait avec ♥ pour les gamers &nbsp;•&nbsp; 2025</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>

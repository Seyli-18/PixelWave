<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <!-- prevent zoom on double tap mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>PixelWave — Flappy Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    :root{
      --bg:#0a0a1a;--accent:#ffe44e;--bad:#ff3c3c;
      --text:#e8e8ff;--muted:#7070a0;--border:#1e1e4a;
      --font-px:'Press Start 2P',monospace;--font-b:'Rajdhani',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    /* critical: prevent all zoom on mobile */
    html{touch-action:manipulation}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;-webkit-user-select:none;user-select:none}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:9999}
    .top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(10,10,26,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
    .logo{font-family:var(--font-px);font-size:.65rem;background:linear-gradient(90deg,#00f0ff,#ff3cac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 6px #00f0ff)}
    .top-right{display:flex;align-items:center;gap:.6rem}
    .back-btn{font-family:var(--font-px);font-size:.5rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.5rem .9rem;border-radius:6px;transition:all .2s}
    .back-btn:hover{color:#00f0ff;border-color:#00f0ff;box-shadow:0 0 10px #00f0ff55}
    .game-area{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;gap:1rem;width:100%}
    h1{font-family:var(--font-px);font-size:.8rem;color:var(--accent);text-shadow:0 0 20px var(--accent);letter-spacing:3px}
    .stats{display:flex;gap:2.5rem;font-family:var(--font-px);font-size:.52rem;letter-spacing:2px;text-align:center}
    .stat-label{color:var(--muted);display:block;margin-bottom:.35rem}
    .stat-val{font-size:.8rem;color:var(--accent)}

    #gameWrap{position:relative;width:320px;max-width:100%}
    #gameCanvas{
      border:2px solid #ffe44e44;border-radius:8px;
      box-shadow:0 0 30px #ffe44e22;background:#000;
      display:block;width:100%;max-width:320px;
      /* prevent context menu on long press */
      -webkit-touch-callout:none;
    }

    /* overlay shown on game over / start */
    #overlay{
      position:absolute;inset:0;border-radius:8px;
      background:rgba(0,0,0,.72);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
    }
    #overlay.hidden{display:none}
    .ov-title{font-family:var(--font-px);font-size:.65rem;color:var(--accent);text-shadow:0 0 12px var(--accent);text-align:center;letter-spacing:2px;line-height:1.8}
    .ov-score{font-family:var(--font-px);font-size:1.4rem;color:#fff}
    .ov-btn{font-family:var(--font-px);font-size:.5rem;letter-spacing:2px;padding:.7rem 1.6rem;border:2px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .ov-btn:hover,.ov-btn:active{background:var(--accent);color:#000;box-shadow:0 0 20px var(--accent)}

    .controls{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
    .btn{font-family:var(--font-px);font-size:.48rem;letter-spacing:2px;padding:.65rem 1.3rem;border:2px solid;border-radius:8px;cursor:pointer;background:transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .btn-tap{color:var(--accent);border-color:var(--accent);font-size:.65rem;padding:1rem 2.5rem}
    .btn-tap:hover,.btn-tap:active{background:var(--accent);color:#000;box-shadow:0 0 20px var(--accent)}

    .tips{font-family:var(--font-px);font-size:.42rem;color:var(--muted);letter-spacing:1px;text-align:center;line-height:2.2}
    .divider{width:100%;max-width:520px;height:1px;background:linear-gradient(90deg,transparent,#1e1e4a,transparent);margin:.5rem 0}
  
    /* ── Thème clair ── */
    [data-theme="light"] body{background:#eeeeff!important;color:#1a1a3a!important}
    [data-theme="light"] .top-bar{background:rgba(240,240,255,.95)!important;border-bottom-color:#c0c0e0!important}
    [data-theme="light"] .back-btn,.fs-btn{color:#5050a0!important;border-color:#c0c0e0!important}
    [data-theme="light"] .section-card,.form-card{background:#fff!important;border-color:#d0d0e0!important}
    [data-theme="light"] h1{filter:drop-shadow(0 0 10px currentColor)}
</style>
  <script>
    // Appliquer le thème sauvegardé immédiatement
    (function(){var t=localStorage.getItem('pw_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <div class="top-bar">
    <div class="logo">PIXEL<span style="-webkit-text-fill-color:#ff3cac">WAVE</span></div>
    <div class="top-right">
      <button class="fs-btn" id="fsBtn">⛶ PLEIN ÉCRAN</button>
      <a href="index.html" class="back-btn">← RETOUR</a>
    </div>
  </div>

  <div class="game-area">
    <h1>🐤 FLAPPY BIRD</h1>
    <div class="stats">
      <div><span class="stat-label">SCORE</span><span class="stat-val" id="scoreEl">0</span></div>
      <div><span class="stat-label">MEILLEUR</span><span class="stat-val" id="bestEl">0</span></div>
      <div><span class="stat-label">NIVEAU</span><span class="stat-val" id="levelEl">1</span></div>
    </div>

    <div id="gameWrap">
      <canvas id="gameCanvas" width="320" height="480"></canvas>
      <!-- Overlay for start / game over -->
      <div id="overlay">
        <div class="ov-title" id="ovTitle">🐤 FLAPPY BIRD</div>
        <div class="ov-score" id="ovScore" style="display:none"></div>
        <button class="ov-btn" id="ovBtn">▶ JOUER</button>
      </div>
    </div>

    <!-- Big tap button for mobile -->
    <button class="btn btn-tap" id="tapBtn" style="margin-top:.5rem">TAP !</button>

    <p class="tips">
      ESPACE · CLIC · TAP → SAUTER<br>
      DOUBLE TAP DÉSACTIVÉ — pas de zoom accidentel
    </p>
  </div>

  <div class="divider"></div>
  <div class="bottom-sections" id="bottomSections"></div>

  <script>
  /* =====================
     FLAPPY BIRD — game.js
     ===================== */
  (function(){
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const ovTitle = document.getElementById('ovTitle');
    const ovScore = document.getElementById('ovScore');
    const ovBtn   = document.getElementById('ovBtn');
    const W = canvas.width, H = canvas.height;

    /* ── Constants ── */
    const PIPE_W    = 52;
    const PIPE_GAP  = 145;
    const GRAVITY   = 0.27;
    const FLAP_V    = -6.2;
    const BIRD_R    = 14;

    /* ── State ── */
    let bird, pipes, score, best, level, running, rafId, frame;
    let bgStars = [];
    for(let i=0;i<55;i++) bgStars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.4,phase:Math.random()*Math.PI*2});

    /* ── Init / Reset ── */
    function init() {
      bird  = { x:72, y:H/2, vy:0, rot:0 };
      pipes = [];
      score = 0; level = 1; frame = 0;
      best  = parseInt(localStorage.getItem('flappyBest')||'0');
      running = false;
      cancelAnimationFrame(rafId);
      updateUI();
      draw(); // draw first frame (bird visible)
    }

    function showOverlay(title, scoreVal, btnLabel) {
      ovTitle.innerHTML  = title;
      ovScore.style.display = scoreVal !== null ? 'block' : 'none';
      if (scoreVal !== null) ovScore.textContent = 'SCORE : ' + scoreVal;
      ovBtn.textContent  = btnLabel;
      overlay.classList.remove('hidden');
    }

    function hideOverlay() { overlay.classList.add('hidden'); }

    /* ── Flap ── */
    function flap() {
      if (!running) return; // handled by overlay button
      bird.vy = FLAP_V;
    }

    /* ── Pipe speed ── */
    function pipeSpeed() { return 2.0 + (level-1)*0.25; }

    /* ── Spawn pipe ── */
    function spawnPipe() {
      const minTop = 55, maxTop = H - PIPE_GAP - 55;
      const top = Math.floor(Math.random()*(maxTop-minTop))+minTop;
      pipes.push({ x: W+12, top, scored: false });
    }

    /* ── Update ── */
    function update() {
      frame++;
      bird.vy  += GRAVITY;
      bird.y   += bird.vy;
      bird.rot  = Math.min(Math.max(bird.vy*0.07, -0.45), 1.3);

      // Spawn pipes
      const interval = Math.max(65, 105 - (level-1)*5);
      if (frame % interval === 0) spawnPipe();

      // Move pipes + score
      const sp = pipeSpeed();
      for (let i = pipes.length-1; i >= 0; i--) {
        pipes[i].x -= sp;
        if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
          pipes[i].scored = true;
          score++;
          if (score > 0 && score % 10 === 0) level++;
          updateUI();
        }
        if (pipes[i].x + PIPE_W < -20) pipes.splice(i, 1);
      }

      // Ceiling / floor
      if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H - 28) return doGameOver();

      // Pipe collision
      for (const p of pipes) {
        const inX = bird.x + BIRD_R - 5 > p.x && bird.x - BIRD_R + 5 < p.x + PIPE_W;
        const inY = bird.y - BIRD_R + 5 < p.top || bird.y + BIRD_R - 5 > p.top + PIPE_GAP;
        if (inX && inY) return doGameOver();
      }
    }

    /* ── Game over ── */
    function doGameOver() {
      running = false;
      cancelAnimationFrame(rafId);
      if (score > best) { best = score; localStorage.setItem('flappyBest', best); }
      updateUI();
      showOverlay('💥 GAME OVER', score, '↺ REJOUER');
      if (window.PixelWave && window.PixelWave.submitScore) window.PixelWave.submitScore(score);
    }

    /* ── Draw ── */
    function draw() {
      // Sky gradient
      const sky = ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,'#05051a'); sky.addColorStop(1,'#0a1a2a');
      ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

      // Stars
      const t = Date.now();
      bgStars.forEach(s => {
        const a = 0.4 + 0.35*Math.sin(t/700 + s.phase);
        ctx.fillStyle = `rgba(200,210,255,${a})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      });

      // Ground
      ctx.fillStyle='#1a3a0a'; ctx.fillRect(0,H-28,W,28);
      ctx.fillStyle='#2a5a15'; ctx.fillRect(0,H-28,W,7);

      // Pipes
      pipes.forEach(p => {
        // top pipe body
        ctx.fillStyle='#1a8a1a'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=6;
        ctx.fillRect(p.x,0,PIPE_W,p.top);
        ctx.fillStyle='#2aaa2a';
        ctx.fillRect(p.x-5,p.top-18,PIPE_W+10,18);
        // bottom pipe body
        ctx.fillStyle='#1a8a1a';
        ctx.fillRect(p.x,p.top+PIPE_GAP,PIPE_W,H-p.top-PIPE_GAP-28);
        ctx.fillStyle='#2aaa2a';
        ctx.fillRect(p.x-5,p.top+PIPE_GAP,PIPE_W+10,18);
        ctx.shadowBlur=0;
      });

      // Bird
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rot);
      // shadow glow
      ctx.shadowColor='#ffe44e'; ctx.shadowBlur=12;
      // body
      ctx.fillStyle='#ffe44e';
      ctx.beginPath(); ctx.ellipse(0,0,BIRD_R,BIRD_R-2,0,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      // wing
      const wOff = running ? Math.sin(frame*0.28)*5 : 0;
      ctx.fillStyle='#ffcc00';
      ctx.beginPath(); ctx.ellipse(-4,wOff,9,5,-0.3,0,Math.PI*2); ctx.fill();
      // eye
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(7,-4,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(8,-5,1.5,0,Math.PI*2); ctx.fill();
      // beak
      ctx.fillStyle='#ff9900';
      ctx.beginPath(); ctx.moveTo(BIRD_R,0); ctx.lineTo(BIRD_R+8,-3); ctx.lineTo(BIRD_R+8,3); ctx.closePath(); ctx.fill();
      ctx.restore();

      // HUD score (only when running)
      if (running) {
        ctx.fillStyle='#fff'; ctx.shadowColor='#000'; ctx.shadowBlur=5;
        ctx.font='bold 26px "Press Start 2P",monospace';
        ctx.textAlign='center';
        ctx.fillText(score, W/2, 48);
        ctx.shadowBlur=0; ctx.textAlign='left';
      }
    }

    /* ── RAF loop ── */
    function loop() {
      rafId = requestAnimationFrame(loop);
      if (running) update();
      draw();
    }

    /* ── UI ── */
    function updateUI() {
      document.getElementById('scoreEl').textContent = score;
      document.getElementById('bestEl').textContent  = best;
      document.getElementById('levelEl').textContent = level;
    }

    /* ── Overlay button ── */
    ovBtn.addEventListener('click', startGame);
    ovBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });

    function startGame() {
      init();
      hideOverlay();
      running = true;
      rafId = requestAnimationFrame(loop);
    }

    /* ── Input — single unified handler ── */
    let lastTap = 0;
    function handleInput(e) {
      // Block double-tap zoom
      const now = Date.now();
      if (now - lastTap < 300) { e.preventDefault(); }
      lastTap = now;
      if (!overlay.classList.contains('hidden')) return; // overlay is open
      flap();
    }

    // Canvas tap/click
    canvas.addEventListener('pointerdown', handleInput, { passive: false });
    // Big tap button
    document.getElementById('tapBtn').addEventListener('pointerdown', handleInput, { passive: false });
    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (!overlay.classList.contains('hidden')) return;
        flap();
      }
    });

    /* ── Start ── */
    init();
    showOverlay('🐤 FLAPPY BIRD<br><br><span style="font-size:.45rem;color:#7070a0">PASSE ENTRE LES TUYAUX !</span>', null, '▶ JOUER');
    rafId = requestAnimationFrame(loop);
  })();
  </script>

  <script src="shared.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.PixelWave.init('flappy', '#ffe44e');
      window.PixelWave.initFullscreen('gameWrap', 'fsBtn');
    });
  </script>
  
  <script>
    // ── Pseudo modal avant le 1er jeu (overlay btn) ──
    (function(){
      var _ovBtn = document.getElementById('ovBtn') || document.getElementById('newBtn');
      if (!_ovBtn) return;
      var _firstPlay = true;
      var _orig = _ovBtn.cloneNode(true);
      _ovBtn.parentNode.replaceChild(_orig, _ovBtn);
      _orig.addEventListener('click', function(e){
        if (_firstPlay && !localStorage.getItem('pw_pseudo')) {
          _firstPlay = false;
          e.stopImmediatePropagation();
          window.PixelWave.promptPseudo('flappy', function(){
            _orig.click();
          });
        } else {
          _firstPlay = false;
        }
      }, true);
    })();
  </script>
</body>
</html>
